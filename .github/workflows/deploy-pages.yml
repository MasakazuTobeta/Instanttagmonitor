name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  detect-pages:
    runs-on: ubuntu-latest
    outputs:
      has_pages: ${{ steps.pages.outputs.has_pages }}
    steps:
      - name: Detect Pages availability
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HAS_PAGES="$(gh api repos/${{ github.repository }} --jq '.has_pages')"
          echo "has_pages=${HAS_PAGES}" >> "$GITHUB_OUTPUT"

          if [ "${HAS_PAGES}" != "true" ]; then
            echo "::warning::GitHub Pages is not enabled for this repository. Build will run, but deployment will be skipped until Pages is enabled in repository settings."
          fi

  build:
    needs: detect-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs:
      - detect-pages
      - build
    if: needs.detect-pages.outputs.has_pages == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
